    - conditions:
      - condition: template
        value_template: '{{ trigger.event.data.command == ''move_with_on_off'' }}'
      sequence:
      - action: light.turn_on
        target:
          entity_id: light.woonkamer
        data:
          brightness: 254
  mode: single
