- id: "1736080909541"
  alias: Stroom waarschuwing
  description: Escalateert acties op basis van hoe lang de overbelasting duurt.
  triggers:
    - entity_id:
        - sensor.energiemeter_net_stroom
      above: sensor.energiemeter_net_zekering
      for:
        hours: 0
        minutes: 0
        seconds: 5
      id: fase_1
      trigger: numeric_state
    - entity_id:
        - sensor.energiemeter_net_stroom
      above: sensor.energiemeter_net_zekering
      for:
        hours: 0
        minutes: 0
        seconds: 30
      id: fase_2
      trigger: numeric_state
    - entity_id: sensor.energiemeter_net_stroom
      above: sensor.energiemeter_net_zekering
      for: 00:01:20
      id: fase_3
      trigger: numeric_state
    - entity_id: sensor.energiemeter_net_stroom
      above: sensor.energiemeter_net_zekering
      for: 00:01:30
      id: fase_4
      trigger: numeric_state
  conditions: []
  actions:
    - choose:
        - conditions:
            - condition: trigger
              id: fase_1
          sequence:
            - action: climate.turn_off
              target:
                entity_id: all
            - action: notify.mobile_app_sm_s901b
              data:
                message: Teveel stroom (5s). Verwarmingen uit.
        - conditions:
            - condition: trigger
              id: fase_2
          sequence:
            - action: switch.turn_off
              target:
                entity_id:
                  - switch.noodlader_auto
                  - switch.quooker
            - action: notify.mobile_app_sm_s901b
              data:
                message: Nog steeds te hoog (1:10). Noodlader en Quooker uit.
        - conditions:
            - condition: trigger
              id: fase_3
          sequence:
            - action: switch.turn_off
              target:
                entity_id:
                  - switch.wasdroger
                  - switch.wasmachine
            - action: notify.mobile_app_sm_s901b
              data:
                message: KRITIEK (1:20). Wasmachine en droger uitgeschakeld.
        - conditions:
            - condition: trigger
              id: fase_4
          sequence:
            - action: switch.turn_off
              target:
                entity_id: all
            - action: notify.mobile_app_sm_s901b
              data:
                message: KRITIEK (1:30). Alles uit.
  mode: parallel
  max: 10
