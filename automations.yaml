- id: "1736081312239"
  alias: Spanning waarschuwing
  description:
    Geeft een melding wanneer de spanning van een apparaat buiten het normale
    bereik valt (hoger dan 253V of tussen 1V en 207V), met uitzondering van Growatt
    sensoren.
  triggers:
    - trigger: template
      value_template:
        "{{ label_entities('Spanning') | map('states') | map('float',
        230) | select('gt', 253) | list | count > 0 }}"
    - trigger: template
      value_template:
        "{{ label_entities('Spanning') | map('states') | map('float',
        230) | select('lt', 207) | list | count > 0 }}"
  conditions: []
  actions:
    - repeat:
        for_each: "{{ label_entities('Spanning') }}"
        sequence:
          - if:
              - condition: template
                value_template:
                  "{% set val = states(repeat.item) | float(230) %} {{ (val
                  > 253 or val < 207) and val != 0 }}

                  "
            then:
              - action: notify.mobile_app_sm_s901b
                data:
                  title: ⚠️ Spanning
                  message:
                    "{{ state_attr(repeat.item, 'friendly_name') }} is nu {{ states(repeat.item)
                    }} V!"
  mode: single
- id: "1750005386050"
  alias: Overloop verlichting
  description:
    Deze automatisering zorgt ervoor dat de verlichting op de overloop
    automatisch aangaat wanneer er beweging wordt gedetecteerd in de gang of op de
    overloop zelf, maar alleen als het donker is. De lichten blijven aan zolang er
    beweging wordt waargenomen. Zodra er één uur lang geen beweging meer is gedetecteerd
    in zowel de gang als op de overloop, wordt de verlichting automatisch uitgeschakeld.
  triggers:
    - type: occupied
      device_id: e13fa775ae5c1aa7dc0dd04f3d6fe2e8
      entity_id: 48f91ab28a35ff8c56779561f10c1d33
      domain: binary_sensor
      trigger: device
    - type: motion
      device_id: f0557193b49cd30a72b37ed875ced7b6
      entity_id: ee892634746b2f5638cbfadb0a0aca3c
      domain: binary_sensor
      trigger: device
  conditions:
    - condition: state
      entity_id: binary_sensor.gang_bewegingsmelder_licht
      state:
        - "off"
  actions:
    - action: light.turn_on
      metadata: {}
      data: {}
      target:
        area_id: overloop
    - wait_template:
        "  {{ (states('binary_sensor.gang_bewegingsmelder_bezetting')
        == 'off') and (states('binary_sensor.overloop_bewegingsmelder') == 'off')
        }}"
      continue_on_timeout: true
      timeout: 01:00:00
      alias: Wachten tot er geen beweging meer gedetecteerd wordt
    - data: {}
      action: light.turn_off
      target:
        area_id: overloop
  mode: single
