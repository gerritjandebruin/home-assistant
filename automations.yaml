      value_template: "{{ label_entities('Apparaattemperatuur') | map('states')
        | map('float', 10) | select('lt', 10) | list | count > 0 }}"
  actions:
    - repeat:
        for_each: "{{ label_entities('Apparaattemperatuur') }}"
        sequence:
          - if:
              - condition: template
                value_template: "{% set val = states(repeat.item) | float(20) %}

                  {{ (val > 90 or val < 10) and val != 0 }}

                  "
            then:
              - action: notify.mobile_app_sm_s901b
                data:
                  title: ⚠️ Apparaattemperatuur
                  message:
                    "{{ state_attr(repeat.item, 'friendly_name') }} is nu {{ states(repeat.item)
                    }}°C!"
  mode: parallel
- id: "1768166469947"
  alias: Probleem waarschuwing
  description: Waarschuwt wanneer een entiteit met label 'Probleem' aan gaat.
  triggers:
    - trigger: template
      value_template:
        '{{ label_entities(''Probleem'') | select(''is_state'', ''on'')
        | reject(''match'', ''^automation\.'') | list | count > 0}}'
  conditions: []
  actions:
    - repeat:
        for_each:
          '{{ label_entities(''Probleem'') | reject(''match'', ''^automation\.'')
          | list }}'
        sequence:
          - if:
              - condition: template
                value_template: "{{ is_state(repeat.item, 'on') }}"
            then:
              - action: notify.mobile_app_sm_s901b
                data:
                  title: ⚠️ Probleem
                  message: "{{ repeat.item }} is aan."
  mode: parallel
