- id: "1603830622083"
  alias: Gang bewegingsmelder
  description: ""
  triggers:
    - type: occupied
      device_id: e13fa775ae5c1aa7dc0dd04f3d6fe2e8
      entity_id: 48f91ab28a35ff8c56779561f10c1d33
      domain: binary_sensor
      trigger: device
    - type: motion
      device_id: f0557193b49cd30a72b37ed875ced7b6
      entity_id: ee892634746b2f5638cbfadb0a0aca3c
      domain: binary_sensor
      trigger: device
    - type: opened
      device_id: 051215d5b20dc09f912d269348bf1441
      entity_id: 4a91250870afd2a57d0c1da622f884cf
      domain: binary_sensor
      trigger: device
  conditions:
    - condition: state
      entity_id: binary_sensor.gang_bewegingsmelder_licht
      state:
        - "off"
  actions:
    - choose:
        - conditions:
            - condition: time
              after: "22:00:00"
              before: 06:00:00
          sequence:
            - data:
                brightness_pct: 1
                color_temp_kelvin: 2000
              action: light.turn_on
              target:
                area_id: gang
      default:
        - data:
            color_temp_kelvin: 3390
            brightness_pct: 51
          action: light.turn_on
          target:
            area_id: gang
    - wait_template:
        "  {{ (states('binary_sensor.gang_bewegingsmelder_bezetting')
        == 'off') and (states('binary_sensor.overloop_bewegingsmelder') == 'off')
        }}"
      continue_on_timeout: true
      timeout: 01:00:00
      alias: Wachten tot er geen beweging meer gedetecteerd wordt
    - data: {}
      action: light.turn_off
      target:
        area_id: gang
  mode: single
