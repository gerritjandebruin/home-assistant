    trigger: device
    id: kort
  - device_id: 3f69258ab8f971e91098360463918649
    domain: zha
    type: remote_button_long_press
    subtype: dim_up
    trigger: device
    id: lang
  conditions: []
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id: kort
      sequence:
      - action: light.toggle
        target:
