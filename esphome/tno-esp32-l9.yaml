esphome:
  name: tno-esp32-l9
  friendly_name: tno-esp32-l9

esp32:
  board: esp32dev
  framework:
    type: arduino

logger:

ota:
  - platform: esphome
    password: "2e335d038dbec38aba4a8e6c6b955a5f"

ethernet:
  type: LAN8720
  mdc_pin: GPIO23
  mdio_pin: GPIO18
  clk_mode: GPIO17_OUT
  phy_addr: 0
  power_pin: GPIO12

  manual_ip: 
    static_ip: 192.168.1.201
    gateway: 192.168.1.1
    subnet: 255.255.255.0
    
i2c:
  scl: GPIO16
  sda: GPIO13
  scan: true
  id: bus_a

web_server:
  port: 80
  local: True

sensor:
  - platform: ina226
    address: 0x40
    shunt_resistance: 0.002 ohm
    max_current: 3.2A
    adc_time: 140us
    adc_averaging: 128
    update_interval: 5s
    current:
      name: "INA226 Current"
    power:
      name: "INA226 Power"
    bus_voltage:
      name: "INA226 Bus Voltage"
    shunt_voltage:
      name: "INA226 Shunt Voltage"
    

mqtt:
  broker: 192.168.1.1
  birth_message: 
    payload: online
    topic: myavailability/topic
  will_message: 
    payload: offline
    topic: myavailability/topic
  topic_prefix: tno-esp32
    